manifestVersion: 1
id: bisq2-node
category: finance
name: Bisq 2 Node
version: "2.1.11.1-rc3"
tagline: Self-hosted Bisq 2 node for the Bisq Connect mobile app
description: >-
  Run your own Bisq 2 node so the Bisq Connect mobile app can connect to a node you
  control instead of a stranger's — more privacy, no third-party trust.


  The node is headless and reaches the Bisq P2P network over its own bundled Tor.
  This app gives it a simple browser face: open it to see node status and a pairing
  QR code, scan it from Bisq Connect, and you're paired.


  Heads up: the pairing code grants trade control of your node. Umbrel's
  authenticated app proxy is what protects it — never expose this app to an
  untrusted network.
developer: Bisq
website: https://bisq.network
dependencies: []
repo: https://github.com/rodvar/bisq2-umbrel
support: https://github.com/bisq-network/bisq-mobile/issues
port: 8091
# Community stores don't auto-discover a local icon.svg — the icon must be an absolute
# URL. We serve our committed bisq2-node/icon.svg via jsDelivr, which (unlike raw GitHub)
# returns it with an image/svg+xml content-type so umbrelOS renders it.
# Pinned to a commit SHA (not @main) so jsDelivr's branch cache can't mask a future
# change — BUMP this SHA whenever you change icon.svg or the gallery jpgs.
icon: https://cdn.jsdelivr.net/gh/rodvar/bisq2-umbrel@b2b1db3d39eda724f97341f84fbedb994a4e7ab3/bisq2-node/icon.svg
# Like the icon, gallery entries must be absolute URLs here — umbrelOS did not resolve
# bare filenames for this community store. Served from the committed jpgs via jsDelivr.
gallery:
  - https://cdn.jsdelivr.net/gh/rodvar/bisq2-umbrel@b2b1db3d39eda724f97341f84fbedb994a4e7ab3/bisq2-node/1.jpg
  - https://cdn.jsdelivr.net/gh/rodvar/bisq2-umbrel@b2b1db3d39eda724f97341f84fbedb994a4e7ab3/bisq2-node/2.jpg
  - https://cdn.jsdelivr.net/gh/rodvar/bisq2-umbrel@b2b1db3d39eda724f97341f84fbedb994a4e7ab3/bisq2-node/3.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
